<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b0e0e6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="400" fill="url(#bgGradient)"/>
  
  <!-- Sky -->
  <rect width="1200" height="250" fill="#87ceeb"/>
  
  <!-- Road -->
  <rect y="250" width="1200" height="150" fill="#d3d3d3"/>
  
  <!-- Road markings -->
  <line x1="0" y1="320" x2="1200" y2="320" stroke="white" stroke-width="3" stroke-dasharray="40,40"/>
  
  <!-- Car illustration -->
  <g transform="translate(600, 280)">
    <!-- Car body -->
    <ellipse cx="0" cy="20" rx="80" ry="40" fill="#0099cc" opacity="0.8"/>
    
    <!-- Car cabin -->
    <rect x="-40" y="-30" width="80" height="35" rx="5" fill="#0099cc"/>
    
    <!-- Windshield -->
    <path d="M -38 -25 L -25 -40 L 25 -40 L 38 -25" fill="#87ceeb" opacity="0.6"/>
    
    <!-- Wheels -->
    <circle cx="-45" cy="40" r="20" fill="#333"/>
    <circle cx="45" cy="40" r="20" fill="#333"/>
    <circle cx="-45" cy="40" r="15" fill="#555"/>
    <circle cx="45" cy="40" r="15" fill="#555"/>
    
    <!-- Windows -->
    <rect x="-60" y="-15" width="25" height="20" rx="3" fill="#87ceeb" opacity="0.5"/>
    <rect x="35" y="-15" width="25" height="20" rx="3" fill="#87ceeb" opacity="0.5"/>
    
    <!-- Door lines -->
    <line x1="0" y1="-10" x2="0" y2="50" stroke="#005a7a" stroke-width="1"/>
  </g>
  
  <!-- Text overlay -->
  <text x="600" y="100" font-size="60" font-weight="bold" text-anchor="middle" fill="#003d82">WANNA DRIVE?</text>
  <text x="600" y="160" font-size="28" text-anchor="middle" fill="#333">We make it easy to buy and sell your car</text>
  
  <!-- Button placeholder -->
  <rect x="500" y="200" width="200" height="45" rx="5" fill="#ffcc00"/>
  <text x="600" y="230" font-size="20" font-weight="bold" text-anchor="middle" fill="#003d82">Find your car</text>
</svg>
