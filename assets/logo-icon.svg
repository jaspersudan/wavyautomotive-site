<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2E9ECF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1E88CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003D7A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#003D7A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#002050;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001A2E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circular background -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#2E9ECF" stroke-width="2" opacity="0.3"/>
  
  <!-- Car silhouette with waves -->
  <g transform="translate(200, 200)">
    <!-- Top wave (bright blue) -->
    <path d="M -80 -40 Q -50 -80, 0 -50 Q 30 -35, 80 -60 Q 100 -75, 130 -30" 
          fill="url(#blueGradient)" stroke="none"/>
    
    <!-- Middle white accent line -->
    <path d="M -90 -15 Q -40 -35, 10 -20 Q 45 -5, 95 -25 Q 115 -35, 140 0" 
          fill="none" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Main dark shape (car body) -->
    <path d="M -85 20 Q -50 -5, -5 20 Q 40 50, 90 20 Q 115 5, 135 40 L 120 90 Q 70 110, 0 95 Q -60 80, -95 100 Z" 
          fill="url(#darkGradient)" stroke="none"/>
    
    <!-- Bottom accent wave (light blue) -->
    <path d="M -100 50 Q -45 30, 10 60 Q 60 85, 120 50 Q 140 40, 155 75" 
          fill="none" stroke="#B0D4E8" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
