<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2E9ECF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1E88CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003D7A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#003D7A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#002050;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001A2E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Car silhouette with waves (left side) -->
  <g>
    <!-- Top wave (bright blue) -->
    <path d="M 50 80 Q 80 40, 120 60 Q 140 75, 180 50 Q 200 35, 250 80" 
          fill="url(#blueGradient)" stroke="none"/>
    
    <!-- Middle white accent line -->
    <path d="M 40 100 Q 90 85, 150 100 Q 180 110, 240 95 Q 260 90, 290 110" 
          fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Main dark shape (car body) -->
    <path d="M 45 130 Q 80 110, 130 130 Q 180 155, 240 125 Q 270 110, 300 140 L 290 180 Q 250 200, 180 185 Q 120 170, 60 190 Z" 
          fill="url(#darkGradient)" stroke="none"/>
    
    <!-- Bottom accent wave (light blue) -->
    <path d="M 35 160 Q 85 145, 150 165 Q 200 180, 260 155 Q 285 145, 310 170" 
          fill="none" stroke="#B0D4E8" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- Text: WAVY -->
  <text x="420" y="200" font-family="Arial, sans-serif" font-size="140" font-weight="900" 
        fill="#003D7A" letter-spacing="8">WAVY</text>
  
  <!-- Text: AUTOMOTIVE -->
  <text x="420" y="280" font-family="Arial, sans-serif" font-size="52" font-weight="400" 
        fill="#002050" letter-spacing="6">AUTOMOTIVE</text>
  
  <!-- Accent line under text -->
  <line x1="420" y1="310" x2="1100" y2="310" stroke="#2E9ECF" stroke-width="3"/>
</svg>
