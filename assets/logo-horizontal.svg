<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 250" width="1400" height="250" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2E9ECF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1E88CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003D7A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#003D7A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#002050;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001A2E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Car silhouette with waves (left side) -->
  <g>
    <!-- Top wave (bright blue) -->
    <path d="M 40 60 Q 65 30, 100 50 Q 115 62, 150 40 Q 165 30, 200 60" 
          fill="url(#blueGradient)" stroke="none"/>
    
    <!-- Middle white accent line -->
    <path d="M 32 80 Q 72 68, 120 80 Q 145 90, 190 75 Q 205 70, 225 90" 
          fill="none" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Main dark shape (car body) -->
    <path d="M 38 110 Q 68 93, 110 110 Q 155 130, 200 105 Q 222 92, 245 115 L 236 150 Q 200 165, 140 155 Q 80 145, 50 160 Z" 
          fill="url(#darkGradient)" stroke="none"/>
    
    <!-- Bottom accent wave (light blue) -->
    <path d="M 28 135 Q 70 122, 120 140 Q 160 155, 210 130 Q 230 120, 250 145" 
          fill="none" stroke="#B0D4E8" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- Text: WAVY -->
  <text x="310" y="145" font-family="Arial, sans-serif" font-size="110" font-weight="900" 
        fill="#003D7A" letter-spacing="6">WAVY</text>
  
  <!-- Text: AUTOMOTIVE -->
  <text x="310" y="205" font-family="Arial, sans-serif" font-size="42" font-weight="400" 
        fill="#002050" letter-spacing="4">AUTOMOTIVE</text>
</svg>
